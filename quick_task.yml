- name: Setting up iSH FS
  hosts: local
  vars_files:
    - vars/internal.yml
    - vars/defaults.yml

  #
  # only one of the below can be used - put the active one last
  #

  #
  # run specific role(-s)
  #
  # roles:
  #  - role: preparational_steps

  #
  # run specific task inside a role
  #
  tasks:
    - name: Include just root_shell.yml from the role
      ansible.builtin.include_role:
        name: all_distros
        tasks_from: service_runbg.yml
