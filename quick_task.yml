- name: Setting up iSH FS
  hosts: "{{ target_hosts }}"
  vars_files:
    - vars.yml

  roles:
    - role: all_distros
  tasks:
    - name: Include just the root_shell.yml from the role
      ansible.builtin.include_tasks: roles/all_distros/tasks/root_shell.yml
