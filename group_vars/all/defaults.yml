---

#
#  Part of https://github.com/jaclu/ish-fstools
#
#  Copyright (c) 025: Jacob.Lundqvist@gmail.com
#
#  License: MIT
#
# User-customizable variables intended to be overridden in vars/overrides.yml
# This file is listed in .gitignore and won’t be overwritten by repository updates.
ift_user_name: ish
ift_shell: /bin/ash
ift_timezone: Europe/Amsterdam

#
#  Defaults
#

ift_runlevel_runbg: sysinit

alpine_base_packages:
  #
  #  Shells
  #
  - bash
  - zsh
  - bash-completion
  - zsh-completions

  #
  #  Tools
  #
  - busybox-extras
  - coreutils
  - procps
  - util-linux
  - sudo
  - shadow
  - shadow-login
  - musl-locales
  - tzdata
  # - man-db
  - findutils
  - sed
  - tar
  - pigz
  - file
  - gawk
  - grep
  - htop
  - less
  - sqlite
  - py3-pip
  - ncdu
  # - fzf

  #
  #  Services
  #
  - openrc
  - dcron
  # - dcron-openrc

  #
  #  Networking Tools
  #
  - ssl_client
  - openssh
  # - git
  # - rsync
  - curl
  - wget
  - elinks
  - mosh
  - mtr

  #
  #  Editors
  #
  - vim
  - nano
  - mg
  - ed
  #
  #  Text-UI
  #
  - ncurses
  - newt
  - tmux
  - bat

  # =============

  #
  #  Other
  #
  # - fortune
alpine_version_dependent_packages:
  - lsb-release-minimal
ift_alpine_packages: "{{ alpine_base_packages +
  (alpine_version_dependent_packages
  if ansible_distribution_version is version('3.17', '>='))
  | default([]) }}"
