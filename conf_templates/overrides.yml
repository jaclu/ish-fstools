#  License: MIT
#
#  User overrides - Primarilly intended to override group_vars/defaults.yml
#  variables starting with "ift_"
#
#  Obviously, you can override anything, but in that case you are on your own,
#  since only the ift_ variables are thorougly checked at runtime, and if empty,
#  the relevant tasks will be skipped.
#
#  Template for <repo_root>/vars/override.yml (this is in .gitignore)
#  If present it will be read as the last variables file, thus overriding all other
#  variable definitions.
#
#  Since these overrides are used both for ifs-tools & my-ish-fs variables relevant
#  to both must be present!
#
# ish-fstools
#   hetz2 chroot: install 49s   update  38s
#   iPad 7th:     update 13 min
#   iPhone 14th:  update  7 min
# my-ish-fs
#   hetz2 chroot: install 15s   update  11s
#   iPad 7th:     update  4 min
#   iPhone 14th:  update  3 min
#

ift_user_name: ish # set to "" to disable
ift_timezone: Europe/Amsterdam

# show some info about detected env, what will be installed etc
# ift_show_extra_status: true

# ift_pkgs_devel: true # set to true if devel packages should be used
# ift_pkgs_linting: true # set to true if linting packages should be used
# ift_pkgs_man: true # se to true if man pages for everything installed should be used

# When the sshd service is first started, host keys will be generated if absent
# on iSH this takes a while... By enabling this option they can be pre-generated
# during deploy. Debian always generates them when openssh-server is installed.
# ift_alpine_generate_sshd_host_keys: false

ift_extra_alpine_packages:
  #
  #  Shells
  #
  # - zsh-completions  # Additional completion definitions for Zsh (packaged as a plugin)
  - zsh-history-substring-search # Zsh port of the Fish shell's history search

  # These are pretty slow on iSH, syntax-parses the command line on every keystroke
  # - zsh-autosuggestions # Fish-like autosuggestions for Zsh
  # - zsh-syntax-highlighting  # Fish shell like syntax highlighting for Zsh

  #
  #  Core utils
  #
  - logrotate # Tool to rotate logfiles
  - direnv # Environment variable switcher for the shell
  - bat # cat(1) clone with wings
  - fd # Simple, fast, user-friendly alternative to find
  - ranger # VIM-inspired filemanager for the console
  - ruby # An object-oriented language for quick and easy programming

  #
  #  Editors
  #
  # - emacs-nox
  - slang # needed for jed

  #
  # File managers
  #
  - ranger # VIM-inspired filemanager for the console
  - yazi # Blazing fast terminal file manager written in Rust

  #
  #  Remote
  #
  - autossh # Automatically restart SSH sessions and tunnels
  - unison # Efficient file-synchronization tool

  #
  #  Scripting
  #
  - py3-pendulum # Python datetimes made easy

ift_extra_devuan_packages:
  #
  #  Core utils
  #
  - logrotate # Tool to rotate logfiles
  - direnv # Environment variable switcher for the shell
  - ranger # VIM-inspired filemanager for the console
  - ruby # An object-oriented language for quick and easy programming

  #
  #  Editors
  #
  - jed # really small emacs compatible editor

  #
  # File managers
  #
  - ranger # VIM-inspired filemanager for the console

  #
  #  Remote
  #
  - autossh # Automatically restart SSH sessions and tunnels
  - unison # Efficient file-synchronization tool

