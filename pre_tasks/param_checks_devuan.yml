- name: Param checks Devuan - Fail if ift_timezone is set but tzdata missing
  fail:
    msg: "tzdata must be in ift_devuan_packages when ift_timezone is defined and non-empty"
  delegate_to: localhost
  run_once: true
  when:
    - ift_timezone | default('') | length > 0
    - "'tzdata' not in (ift_devuan_packages | default([]))"
