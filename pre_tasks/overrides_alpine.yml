#  Alpine FS
#  Handle overrides, needs to be done as a task instead of inside a role,
#  in order to be able to set global variables without linting errors
#

- name: "Overrides Alpine - Extend ift_alpine_packages with extra packages"
  set_fact:
    ift_alpine_packages: >-
      {{ (ift_alpine_packages | default([])) +
         (__override_vars.ift_extra_alpine_packages | default([])) }}
  delegate_to: localhost
  run_once: true
  when: __override_vars is defined

- name: Overrides Alpine - Pkgs for Alpine >= 3.17
  set_fact:
    ift_alpine_packages: >-
      {{ ift_alpine_packages | union(ift_alpine_pkgs_min_317 | default([])) }}
  when: ansible_facts.distribution_version >= "3.17"
  delegate_to: localhost
  # Needs to done per server,since they might run different versions of Alpine
  # run_once: true
  changed_when: false

- name: Overrides Alpine - Pkgs for Alpine >= 3.20
  set_fact:
    ift_alpine_packages: >-
      {{ ift_alpine_packages | union(ift_alpine_pkgs_min_320 | default([])) }}
    ift_alpine_pkgs_linting: >-
      {{ ift_alpine_pkgs_linting | union(ift_alpine_pkgs_lint_min_320 | default([])) }}
  when: ansible_facts.distribution_version >= "3.20"
  delegate_to: localhost
  changed_when: false

- name: Overrides Alpine - Lint Pkgs for Alpine >= 3.23
  set_fact:
    ift_alpine_pkgs_linting: >-
      {{ ift_alpine_pkgs_linting | union(ift_alpine_pkgs_lint_min_323 | default([])) }}
  when: ansible_facts.distribution_version >= "3.23"
  delegate_to: localhost
  # Needs to done per server,since they might run different versions of Alpine
  # run_once: true
  changed_when: false

- name: Overrides Alpine - ift_pkgs_devel=true -> Add Development packages
  set_fact:
    ift_alpine_packages: >-
      {{ ift_alpine_packages | union(ift_alpine_pkgs_devel | default([])) }}
  when:
    - (ift_alpine_pkgs_devel | default([])) | length > 0
    - ift_pkgs_devel | default(false) | bool
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Overrides Alpine - ift_pkgs_devel=false -> Uninstall Development packages
  set_fact:
    ift_alpine_purges: >-
      {{ ift_alpine_purges | default([]) | union(ift_alpine_pkgs_devel | default([])) }}
  when:
    - (ift_alpine_pkgs_devel | default([])) | length > 0
    - not (ift_pkgs_devel | default(false) | bool)
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Overrides Alpine - ift_pkgs_lintingt=true -> Add Linting packages
  set_fact:
    ift_alpine_packages: >-
      {{ ift_alpine_packages | union(ift_alpine_pkgs_linting | default([])) }}
  when:
    - (ift_alpine_pkgs_linting | default([])) | length > 0
    - ift_pkgs_linting | default(false) | bool
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Overrides Alpine - ft_pkgs_lintingt=false -> Uninstall Linting packages
  set_fact:
    ift_alpine_purges: >-
      {{ ift_alpine_purges | default([]) | union(ift_alpine_pkgs_linting | default([])) }}
  when:
    - (ift_alpine_pkgs_linting | default([])) | length > 0
    - not (ift_pkgs_linting | default(false) | bool)
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Overrides Alpine - ift_pkgs_man=true -> Add docs
  set_fact:
    ift_alpine_packages: "{{ ift_alpine_packages | default([]) | union(['docs']) }}"
  when: ift_pkgs_man | default(false)
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Overrides Alpine - ift_pkgs_man=false -> Uninstall docs
  set_fact:
    ift_alpine_purges: "{{ ift_alpine_purges | default([]) | union(['docs']) }}"
  when: not (ift_pkgs_man | default(false) | bool)
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Overrides Alpine - Add openssh-server if it's env is defined
  set_fact:
    ift_alpine_packages: >-
      {{
        ift_alpine_packages | default([])
        | union(['openssh-server'])
      }}
  when:
    - (ift_runlevel_sshd | default('') | trim) != ''
    - (ift_port_sshd | default('') | trim) != ''
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Overrides Alpine - Add autossh if it's env is defined
  set_fact:
    ift_alpine_packages: >-
      {{
        ift_alpine_packages | default([])
        | union(['autossh'])
      }}
  when:
    - (ift_runlevel_sshd | default('') | trim) != ''
    - (ift_port_sshd | default('') | trim) != ''
    - (ift_runlevel_autossh | default('') | trim) != ''
    - (ift_jump_port | default('') | trim) != ''
    - (ift_jump_host | default('') | trim) != ''
  delegate_to: localhost
  run_once: true
  changed_when: false
