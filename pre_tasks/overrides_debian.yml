#
#  Debian FS
#  Handle overrides, needs to be done as a task instead of inside a role,
#  in order to be able to set global variables without linting errors
#

- name: Overrides Debian - Extend ift_debian_packages with extra packages
  set_fact:
    ift_debian_packages: >-
      {{ (ift_debian_packages | default([])) +
         (__override_vars.ift_extra_debian_packages | default([])) }}
  delegate_to: localhost
  run_once: true
  when:
    - __override_vars is defined

- name: Overrides Debian - Debian env - overrides for global vars
  set_fact:
    ift_shell: /bin/bash
  delegate_to: localhost
  run_once: true

- name: Overrides Debian - ift_pkgs_devel=true -> Add Development packages
  set_fact:
    ift_debian_packages: >-
      {{ ift_debian_packages | union(ift_debian_pkgs_devel | default([])) }}
  when:
    - (ift_debian_pkgs_devel | default([])) | length > 0
    - ift_pkgs_devel | default(false) | bool
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Overrides Debian - ift_pkgs_devel=false -> Uninstall Development packages
  set_fact:
    ift_debian_purges: >-
      {{ ift_debian_purges | default([]) | union(ift_debian_pkgs_devel | default([])) }}
  when:
    - (ift_debian_pkgs_devel | default([])) | length > 0
    - not (ift_pkgs_devel | default(false) | bool)
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Overrides Debian - ift_pkgs_lintingt=true -> Add Linting packages
  set_fact:
    ift_debian_packages: >-
      {{ ift_debian_packages | union(ift_debian_pkgs_linting | default([])) }}
  when:
    - (ift_debian_pkgs_linting | default([])) | length > 0
    - ift_pkgs_linting | default(false) | bool
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Overrides Debian - ft_pkgs_lintingt=false -> Uninstall Linting packages
  set_fact:
    ift_debian_purges: >-
      {{ ift_debian_purges | default([]) | union(ift_debian_pkgs_linting | default([])) }}
  when:
    - (ift_debian_pkgs_linting | default([])) | length > 0
    - not (ift_pkgs_linting | default(false) | bool)
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Overrides Debian - ift_pkgs_man=true -> Add man-db
  set_fact:
    ift_debian_packages: "{{ ift_debian_packages | default([]) | union(['man-db']) }}"
  when: ift_pkgs_man | default(false)
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Overrides Debian - ift_pkgs_man=false -> Uninstall man-db
  set_fact:
    ift_debian_purges: "{{ ift_debian_purges | default([]) | union(['man-db']) }}"
  when: not (ift_pkgs_man | default(false) | bool)
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Overrides Alpine - Add openssh-server if it's env is defined
  set_fact:
    ift_debian_packages: >-
      {{
        ift_debian_packages | default([])
        | union(['openssh-server'])
      }}
  when:
    - (ift_runlevel_sshd | default('') | trim) != ''
    - (ift_port_sshd | default('') | trim) != ''
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Overrides Alpine - Add autossh if it's env is defined
  set_fact:
    ift_debian_packages: >-
      {{
        ift_debian_packages | default([])
        | union(['autossh'])
      }}
  when:
    - (ift_runlevel_sshd | default('') | trim) != ''
    - (ift_port_sshd | default('') | trim) != ''
    - (ift_runlevel_autossh | default('') | trim) != ''
    - (ift_jump_port | default('') | trim) != ''
    - (ift_jump_host | default('') | trim) != ''
  delegate_to: localhost
  run_once: true
  changed_when: false

- name: Overrides Debian - List of what apt packages will be installed
  debug:
    msg: "{{ ift_debian_packages | sort }}"
  delegate_to: localhost
  run_once: true
  changed_when: ift_show_extra_status | default(false)
  when: (ift_show_extra_status | default(false))

- name: Overrides Debian - List of what apt packages will be removed
  debug:
    msg: "{{ ift_debian_purges | sort }}"
  delegate_to: localhost
  run_once: true
  changed_when: ift_show_extra_status | default(false)
  when:
    - (ift_debian_purges | default([])) | length > 0
    - ift_show_extra_status | default(false)
