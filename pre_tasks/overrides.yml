#
#  Process vars/overrides.yml
#  Handle overrides, needs to be done as a task instead of inside a role,
#  in order to be able to set global variables without linting errors
#

- name: Overrides - Check if file exists
  stat:
    path: vars/overrides.yml
  delegate_to: localhost
  run_once: true
  register: overrides_file

- name: Overrides - Read file
  set_fact:
    __override_raw: "{{ lookup('file', 'vars/overrides.yml') }}"
  delegate_to: localhost
  run_once: true
  when: overrides_file.stat.exists

- name: Overrides - Parse override vars
  set_fact:
    __override_vars: >-
      {{
        (__override_raw | from_yaml)
          if (__override_raw | trim) != ''
          else {}
      }}
  delegate_to: localhost
  run_once: true
  when: __override_raw is defined

- name: Overrides - Apply overrides
  set_fact:
    "{{ item.key }}": "{{ item.value }}"
  delegate_to: localhost
  run_once: true
  loop: "{{ __override_vars | dict2items }}"
  when: __override_vars is defined

#
# Repo specific configs, should happen after overrides are processed
#
- name: Overrides - Handle Alpine specific configs
  import_tasks: overrides_alpine.yml
  when: ansible_facts.distribution == 'Alpine'

- name: Overrides - Handle Debian specific configs
  import_tasks: overrides_debian.yml
  when: ansible_facts.distribution == 'Debian'

- name: Overrides - Handle Devuan specific configs
  import_tasks: overrides_devuan.yml
  when: ansible_facts.distribution == 'Devuan'
