- name: Check if openrc was used during boot-up
  import_tasks: ../tasks/was_openrc_used_to_boot_system.yml

- name: Run service_disabling_defaults.yml
  import_tasks: service_disabling_defaults.yml

- name: Create symbolic link for /etc/init.d/rc
  file:
    src: "{{ d_init_ift }}/rc"
    dest: "{{ d_init_d }}/rc"
    state: link
  when: ansible_facts.distribution == 'Debian'

- name: Run service_runbg.yml
  include_tasks: service_runbg.yml
  when: (ift_runlevel_runbg | default('') | trim) != ''

- name: Run service_sshd.yml
  include_tasks: service_sshd.yml
  when: use_sshd | default(false)

- name: Run service_monitor_sshd.yml
  include_tasks: service_monitor_sshd.yml
  when:
    - (ift_port_sshd | default('') | trim) != ''
    - (ift_runlevel_sshd | default('') | trim) != ''
