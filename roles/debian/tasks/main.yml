- name: Run apps_debian
  import_tasks: apps_debian.yml

- name: "Deploy custom_openssh {{ ift_openssh_tgz }}"
  import_tasks: custom_openssh.yml
  when:
    - use_sshd | default(false)
    - ansible_facts.distribution == 'Debian'

- name: Install custom /etc/init.d/rc
  copy:
    remote_src: true
    src: "{{ d_repo_debian_role }}/files/etc/init.d/rc"
    dest: "{{ d_init_ift }}/rc"
    owner: root
    group: root
    mode: "0755"

- name: Generate required locales
  locale_gen:
    name: "{{ item }}"
    state: present
  with_items: "{{ ift_locales }}"

- name: Link the fake init to /sbin/init
  file:
    src: /usr/local/sbin/fake-init
    dest: /sbin/init
    state: link
