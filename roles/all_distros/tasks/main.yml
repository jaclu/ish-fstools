- name: Install common /usr/local/bin
  become: true
  ansible.builtin.copy:
    mode: preserve
    # remote_src: true
    src: files/usr_local_bin/
    dest: /usr/local/bin/

- name: Install common /usr/local/sbin
  become: true
  ansible.builtin.copy:
    mode: preserve
    # remote_src: true
    src: files/usr_local_sbin/
    dest: /usr/local/sbin/
