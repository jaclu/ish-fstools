---

- name: Install common config files to /etc
  become: true
  ansible.builtin.copy:
    mode: preserve
    src: "files/{{ item }}"
    dest: "/etc/{{ item }}"
  loop:
    - environment
    - profile-hints

- name: Installing no-pw sudoers group
  become: true
  ansible.builtin.copy:
    mode: preserve
    remote_src: true
    src: "{{ d_common }}/etc/sudoers.d/sudo_no_passwd"
    dest: /etc/sudoers.d

- name: Copy /etc/skel
  become: true
  ansible.builtin.copy:
    # remote_src: true
    mode: preserve
    src: files/etc_skel/
    dest: /etc/skel

