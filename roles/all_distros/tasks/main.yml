---

- name: Install common config files to /etc
  become: true
  ansible.builtin.copy:
    mode: preserve
    remote_src: true
    src: "{{ d_all_distros }}/files/etc/{{ item }}"
    dest: "/etc/{{ item }}"
  loop:
    - environment
    - profile-hints

- name: Copy /etc/skel
  become: true
  ansible.builtin.copy:
    remote_src: true
    mode: preserve
    src: "{{ d_all_distros }}/files/etc/skel"
    dest: /etc

- name: Installing no-pw sudoers group
  become: true
  ansible.builtin.copy:
    mode: preserve
    remote_src: true
    src: "{{ d_all_distros }}/files/etc/sudoers.d/sudo_no_passwd"
    dest: /etc/sudoers.d

