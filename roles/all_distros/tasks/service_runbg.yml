#
#  Installs runbg service
#

- name: Service runbg - Copy service
  become: true
  ansible.builtin.copy:
    remote_src: true
    src: "{{ d_all_distros }}/files{{ d_init_d }}/runbg"
    dest: "{{ d_init_ift }}/"
    owner: root
    group: root
    mode: '0755'

- name: Service runbg - create symbolic link
  ansible.builtin.file:
    src: "{{ d_init_ift }}/runbg"
    dest: "{{ service_runbg }}"
    state: link

- name: Check if 'runbg' is in 'sysinit' runlevel
  ansible.builtin.shell: |
    set -o pipefail
    rc-status sysinit | grep -q '^ runbg'
  register: runbg_check
  changed_when: false
  failed_when: false

- name: Add 'runbg' to 'sysinit' if missing
  ansible.builtin.command: rc-update add runbg sysinit
  when: runbg_check.rc != 0
  changed_when: true
