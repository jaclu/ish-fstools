- name: User acct - Find user with UID 501 different from user_name
  command:
    cmd: >
      awk -F: -v user="{{ user_name }}" '
      $3 == 501 && $1 != user { print $1 }' /etc/passwd
  register: all_distros_conflicting_user
  changed_when: false

- name: User acct - Fail if UID 501 is already used by another user
  fail:
    msg: >
      UID 501 is already assigned to user(s):
      {{ all_distros_conflicting_user.stdout_lines | join(", ") }}
  when: all_distros_conflicting_user.stdout != ""

- name: User acct - Find group with GID 501 different from user_name
  command:
    cmd: >
      awk -F: -v group="{{ user_name }}" '
      $3 == 501 && $1 != group { print $1 }' /etc/group
  register: all_distros_conflicting_group
  changed_when: false

- name: User acct - Fail if GID 501 is already used by another group
  fail:
    msg: >
      GID 501 is already assigned to group(s):
      {{ all_distros_conflicting_group.stdout_lines | join(", ") }}
  when: all_distros_conflicting_group.stdout != ""

- name: User acct - Ensure 'sudo' group exists (Alpine-compatible)
  group:
    name: sudo
    state: present

- name: "User acct - Ensure group with GID 501 exists: {{ user_name }}"
  group:
    name: "{{ user_name }}"
    gid: 501
    state: present
  when: user_name | default('') | length > 0

- name: User acct - Ensure UID:501 user exists with correct shell ({{ user_name }}
  user:
    name: "{{ user_name }}"
    uid: 501
    group: "{{ user_name }}"
    groups: sudo
    # shell: "{{ ift_shell }}"
    state: present
    password: "" # ← explicitly sets empty password, avoids '!' in /etc/shadow
  when:
    - user_name | default('') | length > 0
    - ift_shell | default('') | length > 0

- name: User acct - Check current shell for {{ user_name }}
  command: getent passwd "{{ user_name }}"
  register: all_distros_passwd_line
  changed_when: false

- name: User acct - Set shell for {{ user_name }}
  command: chsh -s "{{ ift_shell }}" "{{ user_name }}"
  when:
    - user_name | default('') | length > 0
    - ift_shell | default('') | length > 0
    - all_distros_passwd_line.stdout.split(':')[6] != ift_shell
  changed_when: true

- name: User acct - Enable autologin for {{ user_name }}
  shell:
    cmd: |
      set -o pipefail
      if "{{ f_app_ift_config }}" | grep autologin | grep -v " {{ user_name }}$"; then
        "{{ f_app_ift_config }}" -a "{{ user_name }}" || exit 30
        exit 43
      fi
  args:
    executable: /bin/bash
  when: user_name | default('') | length > 0
  register: all_distros_autologin_result
  changed_when: "all_distros_autologin_result.rc == 43"
  failed_when: >
    'ERROR' in all_distros_autologin_result.stdout or
    all_distros_autologin_result.rc not in [0, 43]

- name: "Ensure ish-fstools is owned by UID 501 and GID 501 {{ d_repo }}"
  file:
    path: "{{ d_repo }}"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    recurse: true
  when: user_name | default('') | length > 0
