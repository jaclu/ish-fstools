#
#  Install crucial apps on non Alpine distros
#

- name: "(Non Alpine) Package upgrade"
  package:
    update_cache: true
    upgrade: true

- name: "(Non Alpine) List what crucial apps will be installed"
  debug:
    msg: "{{ crucial_apps | sort }}"
  delegate_to: localhost
  run_once: true
  changed_when: ift_show_extra_status | default(false)
  when:
    - (ift_show_extra_status | default(false))

- name: "(Non Alpine) Install crucial apps needed for deploy"
  package:
    state: present
    name: "{{ crucial_apps }}"
