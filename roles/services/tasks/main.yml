- name: " sshd conf - Check if this is my-ish-fs config"
  shell: |
    if grep -q "My-ish-fs Custom settings" /etc/ssh/sshd_config; then
      exit 43
    else
      exit 0
    fi
  args:
    executable: /bin/sh
  register: services_is_my_ish_fs_conf
  changed_when: services_is_my_ish_fs_conf.rc == 43
  failed_when: services_is_my_ish_fs_conf.rc not in [0, 43]

- name: "Run sshd_config.yml"
  include_tasks: sshd_config.yml
  when:
    - (ift_port_sshd | default('') | trim) != ''
    - services_is_my_ish_fs_conf.rc == 0
