- name: Display all Alpine packages being installed
  ansible.builtin.debug:
    msg: |
      Alpine packets to be installed:
      {% for pkg in ift_alpine_packages %}
        {{ pkg }}
      {% endfor %}

# - name: Install selected packages
#   community.general.apk:
#     name: "{{ ift_alpine_packages }}"
#     state: present

- name: Install all packages in one go (no checking, fast)
  ansible.builtin.command: apk add --no-cache {{ ift_alpine_packages | join(' ') }}
  args:
    warn: false
  changed_when: true
  tags:
    - skip_ansible_lint

# no-changed-when: Commands should not change things if nothing needs doing.
# - name: Alpine iSH-AOK packages
#   become: true
#   ansible.builtin.command:
#     state: present
#     name:
#       - nload
#       - nload-doc
#   when:
#     - is_aok_kernel

- name: Install Alpine additions for /usr/local/bin
  # become: true
  ansible.builtin.copy:
    mode: preserve
    remote_src: true
    src: "{{ alpine_d_repo }}/files/usr_local_bin/"
    dest: /usr/local/bin/

- name: Install Alpine additions for /usr/local/sbin
  # become: true
  ansible.builtin.copy:
    mode: preserve
    remote_src: true
    src: "{{ alpine_d_repo }}/files/usr_local_sbin/"
    dest: /usr/local/bin/

