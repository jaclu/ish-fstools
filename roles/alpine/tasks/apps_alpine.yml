- name: Install Alpine additions for /usr/local/bin
  become: true
  ansible.builtin.copy:
    mode: preserve
    remote_src: true
    src: "{{ alpine_d_repo }}/files/usr_local_bin/"
    dest: /usr/local/bin/

- name: Install Alpine additions for /usr/local/sbin
  become: true
  ansible.builtin.copy:
    mode: preserve
    remote_src: true
    src: "{{ alpine_d_repo }}/files/usr_local_sbin/"
    dest: /usr/local/bin/

