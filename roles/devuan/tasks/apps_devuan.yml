#
#  Install selected Devuan apps
#

- name: List what will be installed
  debug:
    msg: "{{ ift_devuan_packages | sort }}"
  run_once: true

- name: Remove packages listed in ift_devuan_purges
  package:
    state: absent
    name: "{{ ift_devuan_purges }}"

- name: Install selected packages
  package:
    state: present
    name: "{{ ift_devuan_packages }}"

- name: Install abduco tarball in /usr/local
  unarchive:
    remote_src: true
    src: "{{ ift_devuan_abduco_tgz }}"
    dest: /

#
#  Reuse file assets from the debian role - they are identical for iSH
#
- name: "Install extras to /usr/local/bin  -- {{ remote_src_lbl }}"
  copy:
    remote_src: true
    src: "{{ d_repo_debian_role }}/files/usr_local_bin/"
    dest: /usr/local/bin/
    mode: preserve

- name: "Install extras to /usr/local/sbin  -- {{ remote_src_lbl }}"
  copy:
    remote_src: true
    src: "{{ d_repo_debian_role }}/files/usr_local_sbin/"
    dest: /usr/local/sbin/
    mode: preserve
