#  Handlers
#

#
#  Restart runbg
#
- name: When chrooted - fake restart runbg
  debug:
    msg: "Simulating service restart -->->   runbg   <-<--"
  changed_when: true
  when: not (is_ish | bool)
  listen: Restart runbg

- name: Restart service - runbg
  service:
    name: runbg
    state: restarted
  when:
    - openrc_softlevel.stat.exists
    - is_ish | bool
  listen: Restart runbg

#
#  Restart monitor-sshd
#
- name: When chrooted - fake restart monitor-sshd
  debug:
    msg: "Simulating service restart -->->   monitor-sshd   <-<--"
  changed_when: true
  when: not (is_ish | bool)
  listen: Restart monitor-sshd

- name: Restart via OpenRC - monitor-sshd
  service:
    name: monitor-sshd
    state: restarted
  when:
    - is_ish | bool
    - openrc_softlevel.stat.exists
  listen: Restart monitor-sshd
