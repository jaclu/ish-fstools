# skipping iSH check here, since on iSH it is really slow, and not needed in
# this playbook

- name: Ensure iSH can run in the background
  # This is just for first deploy, during install a service doing this
  # each time iSH is started will be installed & started
  ansible.builtin.shell: |
    if [ -d /proc/ish ]; then
      (nohup cat /dev/location > /dev/null 2>&1 </dev/null & sleep 0.1)
    fi
  changed_when: false

- name: Package upgrade
  ansible.builtin.package:
    update_cache: true
    upgrade: true

- name: Ensure crucial apps needed for 1st deploy are available
  ansible.builtin.package:
    state: present
    name:
      - git
      - rsync

- name: Checkout ish-fstools into /opt
  ansible.builtin.git:
    repo: https://github.com/jaclu/ish-fstools.git
    dest: /opt/ish-fstools
    version: main
