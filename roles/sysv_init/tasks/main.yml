- name: Run service_runbg.yml
  include_tasks: service_runbg.yml
  when: b_deploy_runbg | default(false)

- name: Run service_sshd.yml
  include_tasks: service_sshd.yml
  when: b_deploy_sshd | default(false)

# to be added...
# - name: Run service_monitor_sshd.yml
#   import_tasks: service_monitor_sshd.yml
#   when:
#     - b_deploy_monitor_sshd | default(false)

- name: Remove dependency cache files
  file:
    path: "{{ item }}"
    state: absent
  with_fileglob:
    - /etc/init.d/.depend.*
